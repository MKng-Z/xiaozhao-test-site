<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务看板 - Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #1a1a2e;
            margin-bottom: 30px;
        }
        h1 { 
            font-size: 2rem; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-top: 10px; }
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
        }
        .board { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .column {
            background: #151520;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1a1a2e;
        }
        .column-header {
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .column-count {
            background: #1a1a2e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .task {
            background: #0d0d14;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }
        .task-title { font-weight: 500; }
        .task-meta {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }
        .status-done { border-left-color: #10b981; }
        .status-progress { border-left-color: #f59e0b; }
        .status-todo { border-left-color: #ef4444; }
        .loading { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 任务看板</h1>
            <p class="subtitle">实时任务追踪与管理</p>
            <a href="./" class="back-link">← 返回 Mission Control</a>
        </header>
        
        <div class="board">
            <div class="column">
                <div class="column-header">
                    📥 待受理 (JJC)
                    <span class="column-count" id="jjc-count">0</span>
                </div>
                <div id="jjc-tasks">
                    <div class="loading">正在加载...</div>
                </div>
            </div>
            
            <div class="column">
                <div class="column-header">
                    🔨 执行中 (尚书省)
                    <span class="column-count" id="shangshu-count">0</span>
                </div>
                <div id="shangshu-tasks">
                    <div class="loading">正在加载...</div>
                </div>
            </div>
            
            <div class="column">
                <div class="column-header">
                    ✅ 已完成
                    <span class="column-count" id="done-count">0</span>
                </div>
                <div id="done-tasks">
                    <div class="loading">正在加载...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="data.js"></script>
    <script>
        // 加载数据并渲染
        function renderBoard() {
            if (typeof missionData === 'undefined') {
                document.querySelectorAll('.loading').forEach(el => {
                    el.textContent = '暂无数据';
                });
                return;
            }
            
            const tasks = missionData.activeTasks || [];
            const jjcTasks = tasks.filter(t => t.state === 'JJC');
            const shangshuTasks = tasks.filter(t => t.state === 'Shangshu');
            const doneTasks = tasks.filter(t => t.state === 'Done');
            
            document.getElementById('jjc-count').textContent = jjcTasks.length;
            document.getElementById('shangshu-count').textContent = shangshuTasks.length;
            document.getElementById('done-count').textContent = doneTasks.length;
            
            renderColumn('jjc-tasks', jjcTasks, 'status-todo');
            renderColumn('shangshu-tasks', shangshuTasks, 'status-progress');
            renderColumn('done-tasks', doneTasks, 'status-done');
        }
        
        function renderColumn(id, tasks, statusClass) {
            const container = document.getElementById(id);
            if (tasks.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">暂无任务</div>';
                return;
            }
            container.innerHTML = tasks.map(t => `
                <div class="task ${statusClass}">
                    <div class="task-title">${t.title}</div>
                    <div class="task-meta">${t.id} | ${t.org}</div>
                </div>
            `).join('');
        }
        
        renderBoard();
    </script>
</body>
</html>
