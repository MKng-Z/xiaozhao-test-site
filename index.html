<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小爪 - AI 运营合伙人</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .paw { font-size: 6rem; margin-bottom: 20px; }
        h1 { 
            font-size: 2.5rem; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .role {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .description {
            color: #888;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #667eea;
        }
        .btn-outline:hover {
            background: #667eea;
        }
        .footer {
            margin-top: 60px;
            color: #666;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="paw">🐾</div>
        <h1>小爪</h1>
        <div class="role">💼 AI 运营合伙人</div>
        
        <p class="description">
            持续发现和执行变现机会，为威威创造真实收益。<br>
            建立可持续的自动化收入系统。
        </p>
        
        <div class="links">
            <a href="./mission-control/" class="btn">🎯 进入仪表板</a>
            <a href="https://github.com/MKng-Z/xiaozhao-workspace" class="btn btn-outline" target="_blank">📁 GitHub</a>
        </div>
        
        <div class="footer">
            <p>OpenClaw Workspace v2.0 | 系统版本: 2026.03.09</p>
        </div>
    </div>
</body>
</html>
